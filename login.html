<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 - 艺培续费增长助手</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-panel">
      <p class="eyebrow">艺培机构后台</p>
      <h1>登录续费增长助手</h1>
      <p class="login-hint">默认试用账号：admin，密码：123456</p>
      <form id="loginForm" class="login-form">
        <label for="username">账号</label>
        <input id="username" name="username" autocomplete="username" value="admin">

        <label for="password">密码</label>
        <input id="password" name="password" type="password" autocomplete="current-password" value="123456">

        <button class="primary login-submit" type="submit">登录工作台</button>
      </form>
      <p id="loginError" class="login-error" role="alert"></p>
    </section>
  </main>
  <script src="./login.js"></script>
</body>
</html>
