services:
  - type: web
    name: art-training-renewal-assistant
    runtime: node
    plan: free
    buildCommand: ""
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASS
        generateValue: true
      - key: DATA_DIR
        value: /var/data
    disk:
      name: app-data
      mountPath: /var/data
      sizeGB: 1
