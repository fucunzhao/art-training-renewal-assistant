<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>艺培续费增长助手 MVP</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">艺培机构 MVP</p>
      <h1>续费增长助手</h1>
    </div>
    <div class="topbar-right">
      <div class="summary-strip" aria-label="经营摘要">
        <div>
          <span id="summaryRisk">0</span>
          <small>高风险</small>
        </div>
        <div>
          <span id="summaryDue">0</span>
          <small>14天内课消完</small>
        </div>
        <div>
          <span id="summaryValue">¥0</span>
          <small>待保护收入</small>
        </div>
      </div>
      <div class="account-box">
        <span id="currentUser">未登录</span>
        <button id="logoutButton" type="button">退出</button>
      </div>
    </div>
  </header>

  <main class="app-shell">
    <section class="fold-section" data-fold-section="entry">
      <button class="fold-header" type="button" aria-expanded="true">
        <div>
          <p class="eyebrow">后台录入</p>
          <h2>学员信息采集</h2>
        </div>
        <span class="fold-meta">手动录入、文件上传、AI识别导入</span>
      </button>
      <div class="fold-body">
        <section class="entry-panel" aria-label="录入学生信息">
          <div class="section-title entry-title">
            <div>
              <p class="eyebrow">手动录入</p>
              <h2>新增学员信息</h2>
            </div>
            <span>提交后自动进入续费风险看板</span>
          </div>
          <form id="studentForm" class="student-form">
            <label>
              学员姓名
              <input name="name" required placeholder="例如：李安然">
            </label>
            <label>
              课程
              <input name="course" required placeholder="例如：少儿美术基础">
            </label>
            <label>
              负责老师
              <input name="teacher" required placeholder="例如：王老师">
            </label>
            <label>
              剩余课时
              <input name="lessonsLeft" type="number" min="0" value="4">
            </label>
            <label>
              预计课消天数
              <input name="daysToEnd" type="number" min="0" value="14">
            </label>
            <label>
              近月缺勤率 %
              <input name="absentRate" type="number" min="0" max="100" value="0">
            </label>
            <label>
              家长近两周回复次数
              <input name="parentReplies" type="number" min="0" value="1">
            </label>
            <label>
              作业缺交次数
              <input name="homeworkMissed" type="number" min="0" value="0">
            </label>
            <label>
              续费金额
              <input name="renewalValue" type="number" min="0" value="3980">
            </label>
            <label>
              最近联系
              <input name="lastContact" placeholder="例如：7天前" value="未联系">
            </label>
            <label class="wide">
              成长证据 1
              <input name="proofTitle1" placeholder="标题，例如：线条控制">
              <textarea name="proofText1" rows="2" placeholder="具体表现，例如：能独立完成轮廓和比例调整。"></textarea>
            </label>
            <label class="wide">
              成长证据 2
              <input name="proofTitle2" placeholder="标题，例如：课堂状态">
              <textarea name="proofText2" rows="2" placeholder="具体表现，例如：专注时间提升，愿意表达创作想法。"></textarea>
            </label>
            <div class="form-actions wide">
              <button class="primary" type="submit">保存学员</button>
              <button id="resetStudentForm" type="button">清空</button>
            </div>
          </form>
        </section>

        <section class="ai-panel" aria-label="AI知识库录入">
          <div class="section-title entry-title">
            <div>
              <p class="eyebrow">AI录入</p>
              <h2>从知识库自动采集</h2>
            </div>
            <div class="ai-actions">
              <button id="scanKnowledgeButton" type="button">扫描知识库</button>
              <button id="extractKnowledgeButton" class="primary" type="button">AI识别学员</button>
              <button id="importKnowledgeButton" type="button">导入选中</button>
            </div>
          </div>
          <p class="knowledge-path">上传学员记录文件，或扫描服务器 <code>knowledge_base</code> 文件夹，支持 txt、md、json、csv。</p>
          <div class="upload-row">
            <input id="knowledgeUpload" type="file" accept=".txt,.md,.json,.csv">
            <button id="uploadKnowledgeButton" type="button">上传到知识库</button>
          </div>
          <div id="knowledgeFiles" class="knowledge-files"></div>
          <div id="knowledgeCandidates" class="knowledge-candidates"></div>
        </section>
      </div>
    </section>

    <section class="fold-section" data-fold-section="dashboard">
      <button class="fold-header" type="button" aria-expanded="true">
        <div>
          <p class="eyebrow">前台看板</p>
          <h2>续费风险工作台</h2>
        </div>
        <span class="fold-meta">筛选风险、查看证据、生成话术</span>
      </button>
      <div class="fold-body">
        <section class="control-panel" aria-label="筛选条件">
          <div class="search-box">
            <label for="searchInput">搜索学员</label>
            <input id="searchInput" type="search" placeholder="姓名、课程、老师">
          </div>
          <div class="filter-row" role="tablist" aria-label="风险筛选">
            <button class="filter-button active" data-filter="all">全部</button>
            <button class="filter-button" data-filter="high">高风险</button>
            <button class="filter-button" data-filter="due">快课消</button>
            <button class="filter-button" data-filter="quiet">家长沉默</button>
          </div>
        </section>

        <section class="workspace">
          <aside class="student-list" aria-label="学员列表">
            <div class="list-head">
              <h2>待跟进学员</h2>
              <span id="resultCount">0人</span>
            </div>
            <div id="studentList" class="student-list-inner"></div>
          </aside>

          <section class="detail-panel" aria-live="polite">
            <div class="detail-head">
              <div>
                <p id="studentCourse" class="eyebrow">课程</p>
                <h2 id="studentName">选择一位学员</h2>
              </div>
              <span id="riskBadge" class="risk-badge">风险</span>
            </div>

            <div class="metric-grid">
              <div class="metric">
                <span id="riskScore">0</span>
                <small>流失风险分</small>
              </div>
              <div class="metric">
                <span id="lessonsLeft">0</span>
                <small>剩余课时</small>
              </div>
              <div class="metric">
                <span id="daysToEnd">0</span>
                <small>预计课消天数</small>
              </div>
              <div class="metric">
                <span id="renewalValue">¥0</span>
                <small>续费金额</small>
              </div>
            </div>

            <div class="insight-band">
              <div>
                <h3>系统判断</h3>
                <ul id="riskReasons"></ul>
              </div>
              <div>
                <h3>推荐动作</h3>
                <p id="nextAction"></p>
              </div>
            </div>

            <div class="growth-section">
              <div class="section-title">
                <h3>成长证据</h3>
                <button id="copyProofButton" type="button">复制续费证据</button>
              </div>
              <div id="growthTimeline" class="timeline"></div>
            </div>

            <div class="message-section">
              <div class="section-title">
                <h3>家长沟通话术</h3>
                <div class="tone-switch" aria-label="话术语气">
                  <button class="tone-button active" data-tone="warm">温和</button>
                  <button class="tone-button" data-tone="direct">直接</button>
                  <button class="tone-button" data-tone="premium">高客单</button>
                </div>
              </div>
              <textarea id="messageBox" rows="8" aria-label="自动生成的沟通话术"></textarea>
              <div class="action-row">
                <button id="copyMessageButton" class="primary" type="button">复制话术</button>
                <button id="markContactedButton" type="button">标记已跟进</button>
                <button id="markRenewedButton" type="button">标记已续费</button>
              </div>
            </div>
          </section>
        </section>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="./app.js"></script>
</body>
</html>
